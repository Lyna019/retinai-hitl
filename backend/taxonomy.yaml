ARMD:
  kind: PATH
  full_name: "Age-Related Macular Degeneration"
  synonyms:
    - "ARMD"
    - "DMLA"
    - "AMD"
    - "age-related macular degeneration"
    - "dégénérescence maculaire"
    - "degenerescence maculaire"
  severity_scale: "AREDS_simplified"
  severity_synonyms:
    # AREDS simplified severity scale used in clinical practice:
    #   dry_early     = small/medium drusen, no pigmentary changes
    #   dry_intermediate = large drusen and/or pigmentary changes
    #   dry_advanced  = geographic atrophy (GA)
    #   wet           = choroidal neovascularization (CNV / exudative)
    # French notes often use just "sèche"/"humide" or "atrophique"/"exsudative"
    dry_early: ["DMLA sèche débutante", "DMLA débutante", "early AMD", "DMLA sèche stade 1"]
    dry_intermediate: ["DMLA sèche intermédiaire", "DMLA intermédiaire", "intermediate AMD"]
    dry_advanced: ["DMLA atrophique", "atrophie géographique", "geographic atrophy", "GA", "DMLA sèche avancée"]
    wet: ["DMLA exsudative", "DMLA humide", "DMLA néovasculaire", "wet AMD", "exudative AMD", "DMLA exudative"]
    unspecified: ["DMLA", "AMD", "ARMD"]
  source_datasets: ["RFMiD v1: ARMD", "RFMiD v2: ARMD", "ODIR: A", "BRSet: amd"]
  notes: |
    KEEP. Unified from A / amd across sources. Severity must be extracted as
    a field: dry_early / dry_intermediate / dry_advanced / wet / unspecified.
    "DMLA humide" ⇒ severity="wet". "DMLA sèche" without further detail ⇒
    severity="dry_early" (conservative default).

