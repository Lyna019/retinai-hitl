# =============================================================================
#  PROCEDURAL / WORKFLOW MARKERS — not pathologies, used as exclusion filters
# =============================================================================

OCT_DONE:
  kind: SIGN
  full_name: "OCT Performed (procedural marker)"
  procedural: true
  synonyms:
    - "OCT"
    - "OCT maculaire"
    - "OCT papillaire"
  source_datasets: []
  notes: "Procedural marker — not a pathology."

INJECTION:
  kind: SIGN
  full_name: "Intravitreal Injection (procedural marker)"
  procedural: true
  synonyms:
    - "IVT"
    - "injection intra-vitréenne"
    - "anti-VEGF"
    - "Lucentis"
    - "Avastin"
    - "Eylea"
  source_datasets: []
  notes: "Procedural marker — not a pathology. Often co-occurs with ME / ARMD."

LASER_TREATMENT:
  kind: SIGN
  full_name: "Laser Treatment Performed (procedural marker)"
  procedural: true
  synonyms:
    - "PRP"
    - "panphotocoagulation"
    - "panphotocoagulation rétinienne"
    - "laser PRP"
    - "photocoagulation"
    - "photocoagulation panrétinienne"
    - "laser argon"
  source_datasets: []
  notes: |
    Procedural marker indicating laser was performed — a treatment, not a
    pathology. The visible after-effects on the fundus are captured by the
    LS (Laser Scars) entity. Extractors must NOT promote this marker to a
    diagnosis: a note saying "PRP fait" still requires a separate
    pathology mention (typically DR with severity R4).

REFRACTION:
  kind: SIGN
  full_name: "Refraction Note"
  procedural: true
  synonyms:
    - "myopie"
    - "hypermétropie"
    - "hypermetropie"
    - "astigmatisme"
    - "astigmatism"
  source_datasets: []
  notes: "Procedural noise — refraction-only notes are filtered out."

DRY_EYE:
  kind: SIGN
  full_name: "Dry Eye"
  procedural: true
  synonyms:
    - "sécheresse oculaire"
    - "secheresse oculaire"
    - "dry eye"
  source_datasets: []
  notes: "Anterior-segment finding, filtered out."

SCHEDULES:
  kind: SIGN
  full_name: "Scheduling Marker"
  procedural: true
  synonyms:
    - "revoir"
    - "rdv"
    - "RDV dans"
    - "revue dans"
    - "controle dans"
    - "contrôle dans"
  source_datasets: []
  notes: "Scheduling marker — strongest noise signal in the corpus."





