# =============================================================================
#  RetinAI Pathology & Sign Taxonomy — Clinician-Validated Final Version
#  ---------------------------------------------------------------------------
#  This taxonomy is the SINGLE SOURCE OF TRUTH for every regex, prompt, and
#  label in the pipeline. Built by reconciling five public retinal datasets
#  (RFMiD v1, RFMiD v2, ODIR, Mendeley, BRSet) against the clinical reality
#  observed by the supervising ophthalmologist (Dr. Mekki) at Ibn Al Haythem.
#
#  Reconciliation actions applied during construction:
#    KEEP    : label kept as-is from the source(s).
#    KEEP*   : anterior-segment label kept to test fundus detectability.
#    RENAME  : label renamed for clarity or to match clinical practice.
#    DROP    : label removed (clinically irrelevant or absent in Algeria).
#    NEW     : label added by the clinician — no source data, AL-only at start.
#
#  Lines starting with `_` (e.g. `_metadata`) are metadata, skipped by the
#  loader.
# =============================================================================

_metadata:
  authored_by: "Dr. Moataz Billah Mekki (supervising ophthalmologist)"
  reconciled_with: ["RFMiD v1", "RFMiD v2", "ODIR", "Mendeley", "BRSet"]
  last_updated: "2026-04-15"
  language: "fr"
  version: "1.0"
  notes: |
    Final version. Reflects the clinician's review of every label across the
    five public retinal datasets. The action column ("Doctor's Decision") is
    encoded in each entity's `notes` field for full audit traceability.

# =============================================================================
#  PATHOLOGIES (kind: PATH) — supervised classifier targets when frequent
#  enough; rare ones routed via open-set + active learning queue.
# =============================================================================

# ---------------------------------------------------------------------------
#  Vascular pathologies — diabetic retinopathy and its complications
# ---------------------------------------------------------------------------

DR:
  kind: PATH
  full_name: "Diabetic Retinopathy"
  synonyms:
    - "DR"
    - "RD"
    - "rétinopathie diabétique"
    - "retinopathie diabetique"
    - "diabetic retinopathy"
  severity_scale: "ICDR"            # International Clinical DR scale: R0, R1, R2, R3, R4
  severity_synonyms:
    # Stage-specific terms encountered in clinical notes — extractor must
    # populate the `severity` field of the PathologyMention, NOT create a
    # separate pathology code.
    R0: ["pas de RD", "RD absente"]
    R1: ["RD non proliférante minime", "NPDR mild", "RDNP minime"]
    R2: ["RD non proliférante modérée", "NPDR moderate", "RDNP modérée"]
    R3: ["RD non proliférante sévère", "NPDR severe", "RDNP sévère", "RDNP préproliférante"]
    R4: ["RD proliférante", "PDR", "RDP", "DR proliferante", "DR proliférante"]
  source_datasets: ["RFMiD v1: DR", "RFMiD v2: DR", "Mendeley: DR", "BRSet: diabetic_retinopathy"]
  ambiguous_with: ["Retinal_Detachment"]
  notes: |
    KEEP. Disambiguate against retinal detachment by surrounding tokens:
    diabetes-related vocabulary nearby ⇒ DR; structural vocabulary
    (décollement, déchirure, macula off) ⇒ Retinal_Detachment.
    PDR / RDP / "DR proliférante" are the R4 stage of DR — extractor must
    set severity="R4", NOT emit a separate pathology code.
    ODIR "D" rows (1,608) removed: systemic diabetes ≠ DR.

# ---------------------------------------------------------------------------
#  Macular pathologies
