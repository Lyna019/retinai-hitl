# ---------------------------------------------------------------------------
#  Hypertensive / haemorrhagic retinopathies
# ---------------------------------------------------------------------------

HTN:
  kind: PATH
  full_name: "Hypertensive Retinopathy"
  synonyms:
    - "HTN"
    - "rétinopathie hypertensive"
    - "retinopathie hypertensive"
    - "hypertensive retinopathy"
    - "RH"                          # Rétinopathie Hypertensive
    - "fond d'œil hypertensif"
    - "FO hypertensif"
  severity_scale: "Keith_Wagener_Barker"
  severity_synonyms:
    # Keith-Wagener-Barker (KWB) classification, grades I-IV:
    #   I   = mild arteriolar narrowing
    #   II  = + AV nicking, focal arteriolar constriction
    #   III = + hemorrhages, exudates, cotton-wool spots
    #   IV  = + papilledema (malignant hypertension)
    grade_I: ["RH stade 1", "KWB I", "stade 1", "arteriolar narrowing", "rétrécissement artériolaire"]
    grade_II: ["RH stade 2", "KWB II", "stade 2", "signe du croisement", "AV nicking", "croisement artério-veineux"]
    grade_III: ["RH stade 3", "KWB III", "stade 3", "hémorragies et exsudats", "nodules cotonneux avec hémorragies"]
    grade_IV: ["RH stade 4", "KWB IV", "stade 4", "œdème papillaire", "RH maligne", "HTA maligne"]
    unspecified: ["rétinopathie hypertensive", "RH", "HTN"]
  source_datasets: ["RFMiD v2: HTN", "BRSet: hypertensive_retinopathy"]
  notes: |
    KEEP. ODIR 'H' rows (128) removed: systemic HTA ≠ HTN retinopathy.
    Severity follows Keith-Wagener-Barker grades I–IV. French notes often
    say "stade X" or describe signs that map to a specific grade. When only
    "rétinopathie hypertensive" without staging, set severity="unspecified".

