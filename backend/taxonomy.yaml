# =============================================================================
#  ANTERIOR-SEGMENT LABELS (kind: PATH, anterior_segment: true)
#  Kept to test fundus detectability — the supervising clinician marked
#  these as worth investigating because they may have visible fundus
#  effects. The classifier may learn negative associations (sharper retinal
#  detail when no cataract, etc.).
# =============================================================================

Cataract:
