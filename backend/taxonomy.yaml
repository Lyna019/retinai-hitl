Glaucoma:
  kind: PATH
  full_name: "Glaucoma"
  synonyms:
    - "glaucome"
    - "glaucoma"
    - "GPAO"                        # Glaucome Primitif à Angle Ouvert
    - "POAG"
    - "GNT"                         # Glaucome à Tension Normale
    - "NTG"                         # Normal Tension Glaucoma
    - "GFA"                         # Glaucome à Angle Fermé
    - "GAF"
  severity_scale: "glaucoma_fundus"
  severity_synonyms:
    # Fundus-based grading (cup-disc ratio + nerve fibre layer):
    suspect: ["glaucome suspect", "suspect glaucomateux", "CDR limite", "C/D 0.5", "excavation suspecte"]
    mild: ["glaucome débutant", "GPAO débutant", "glaucome initial", "CDR 0.5-0.6", "C/D 0.6"]
    moderate: ["glaucome modéré", "GPAO modéré", "CDR 0.7", "C/D 0.7", "excavation 0.7"]
    severe: ["glaucome avancé", "glaucome sévère", "GPAO sévère", "CDR 0.8", "CDR 0.9", "C/D 0.9", "excavation totale"]
    end_stage: ["glaucome terminal", "atrophie optique glaucomateuse", "glaucome absolu"]
    unspecified: ["glaucome", "GPAO", "POAG"]
  source_datasets: ["ODIR: G", "Mendeley: Glaucoma"]
  notes: |
    KEEP. Fundus-observable through cup-disc ratio (CDR). Notes often mention
    the CDR numerically ("C/D 0.7", "excavation 7/10") — extractor should
    map these to the closest severity grade. When only "glaucome" is written
    without further detail, set severity="unspecified".

